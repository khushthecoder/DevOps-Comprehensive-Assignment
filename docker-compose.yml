services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: app
    restart: always
    ports:
      - "80:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/usersdb
      - PORT=5000
    depends_on:
      - mongo

volumes:
  mongo-data: